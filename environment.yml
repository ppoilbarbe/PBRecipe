name: pbrecipe

channels:
  - conda-forge

dependencies:
  - python=3.12
  # GUI
  - pyside6
  # Fonts (bundled in the PyInstaller bundle via pbrecipe.spec)
  - fonts-conda-ecosystem   # meta-package: Ubuntu, DejaVu, Inconsolata, SourceCodePro
  # YAML
  - ruamel.yaml
  - ruamel.yaml.clib
  # Databases
  - sqlalchemy       # DB abstraction (SQLite/MariaDB/PostgreSQL)
  - pymysql          # MariaDB / MySQL driver
  - psycopg2         # PostgreSQL driver
  # Tests
  - pytest
  - pytest-qt
  - pytest-cov
  # Lint / hooks
  - ruff
  - pre-commit
  # PHP (for PHP tests)
  - php
  # GitHub CLI
  - gh
  # Packaging
  - pyinstaller
  - python-build    # sdist via `python -m build`
  - pillow          # .ico/.icns icon generation + PyInstaller conversion
  # Documentation
  - sphinx>=7
  - sphinx-rtd-theme>=2
  - sphinx-autobuild>=2024
  - sphinxcontrib-mermaid>=0.9
  # Dev install (editable)
  - pip
  - pip:
      - -e ".[dev]"
