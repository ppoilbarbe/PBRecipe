name: pbrecipe

channels:
  - conda-forge

dependencies:
  - python=3.12
  # GUI
  - pyside6
  # Polices (embarquées dans le bundle PyInstaller via pbrecipe.spec)
  - fonts-conda-ecosystem   # meta-paquet : Ubuntu, DejaVu, Inconsolata, SourceCodePro
  # YAML
  - ruamel.yaml
  - ruamel.yaml.clib
  # Databases
  - sqlalchemy       # abstraction DB (SQLite/MariaDB/PostgreSQL)
  - pymysql          # driver MariaDB / MySQL
  - psycopg2         # driver PostgreSQL
  # Tests
  - pytest
  - pytest-qt
  - pytest-cov
  # Lint / hooks
  - ruff
  - pre-commit
  # PHP (pour les tests PHP)
  - php
  # GitHub CLI
  - gh
  # Packaging
  - pyinstaller
  - python-build    # sdist via `python -m build`
  - pillow          # génération des icônes .ico/.icns + conversion PyInstaller
  # Dev install (editable)
  - pip
  - pip:
      - -e ".[dev]"
