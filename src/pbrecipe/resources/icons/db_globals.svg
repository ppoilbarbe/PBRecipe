<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Cylinder body fill -->
  <rect x="3" y="4" width="12" height="9" fill="#d8c8b4"/>
  <!-- Bottom ellipse -->
  <ellipse cx="9" cy="13" rx="6" ry="2" fill="#d8c8b4" stroke="#5a3c22" stroke-width="1.3"/>
  <!-- Side walls -->
  <line x1="3" y1="4" x2="3" y2="13" stroke="#5a3c22" stroke-width="1.3"/>
  <line x1="15" y1="4" x2="15" y2="13" stroke="#5a3c22" stroke-width="1.3"/>
  <!-- Middle stripe -->
  <ellipse cx="9" cy="8.5" rx="6" ry="2" fill="none" stroke="#8a6a50" stroke-width="1" stroke-dasharray="2.5,2"/>
  <!-- Top ellipse -->
  <ellipse cx="9" cy="4" rx="6" ry="2" fill="#e8d8c4" stroke="#5a3c22" stroke-width="1.3"/>
  <!-- Document badge -->
  <rect x="14" y="14" width="9" height="9" rx="1.2" fill="#4a7fb5"/>
  <line x1="16" y1="17.5" x2="21" y2="17.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="19.5" x2="21" y2="19.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="21.5" x2="19" y2="21.5" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
